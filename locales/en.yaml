    aboutMessage: "The statistics tab is still being developed and will gain more features over time."
    period:
      week: "By week"
      month: "By month"
      year: "By year"
      global: "Overall"
    cards:
      tasksDone: "Tasks done"
      perfectDays: "Perfect days"
      completion: "Completion"
      charge: "Load"
  streakExplain:
    title: "What is a streak?"
    definitionTitle: "Definition"
    definition: "A streak is a consecutive series of days where you completed 100% of your tasks. It measures your consistency and commitment."
    howTitle: "How does it work?"
    bullets:
      - "Every day counts toward your streak"
      - "You must complete all your tasks to keep the streak"
      - "If you miss even one task, the streak breaks"
      - "The streak counts past days, not today"
    conditionsTitle: "Conditions to have a streak"
    conditions:
      - title: "100% completion"
        description: "You must complete all your goals for the day. A single incomplete task breaks the chain."
      - title: "Consecutiveness"
        description: "Days must be consecutive. Missing one day immediately breaks your streak."
      - title: "Count past days"
        description: "Only days before today are counted. The current day is not included."
    exampleTitle: "Example"
    exampleSuccess:
      - "✓ Day 1 - All tasks completed"
      - "✓ Day 2 - All tasks completed"
      - "✓ Day 3 - All tasks completed"
      - "→ 3-day streak"
    exampleFail:
      - "✓ Day 1 - All tasks completed"
      - "✓ Day 2 - All tasks completed"
      - "✗ Day 3 - One missed task"
      - "→ Streak broken, back to 0"
    tipsTitle: "Tips"
    tips:
      - title: "Stay consistent"
        description: "A streak is a great way to measure commitment. Try to keep it going as long as possible!"
      - title: "Plan your tasks"
        description: "Make sure your daily goals are realistic so you can complete them every day."
      - title: "Celebrate progress"
        description: "Every completed day is a win! Extend your streak and see how far you can go."
  completionExplain:
    title: "What is the completion rate?"
    definitionTitle: "Definition"
    definition: "The completion rate is the average percentage of tasks you complete over a given period. It indicates your ability to reach your goals."
    howTitle: "How is it calculated?"
    bullets:
      - "For each day, completed tasks are divided by total tasks"
      - "Formula: (completed tasks / total tasks) × 100"
      - "A 7-day average is then calculated"
      - "The result is expressed as a percentage"
    interpretationTitle: "How to read the results"
    levels:
      - range: "0% - 40%"
        description: "Very low: your goals may be too ambitious or motivation is lacking"
      - range: "40% - 70%"
        description: "In progress: you are improving but there is still room to grow"
      - range: "70% - 90%"
        description: "Very good: you are managing your goals well"
      - range: "90% - 100%"
        description: "Excellent: you almost always achieve your goals"
    meaningTitle: "What it means"
    meanings:
      - emoji: "✅"
        title: "High rate (90%+)"
        description: "You are consistent and reliable. Your goals match your actual capacity."
      - emoji: "⚠️"
        title: "Medium rate (50-80%)"
        description: "You have good days and bad days. Analyze recurring obstacles."
      - emoji: "🔴"
        title: "Low rate (<50%)"
        description: "Your goals are probably too many or too complex. Start smaller."
    exampleTitle: "Example"
    exampleSubtitle: "Calculation over 7 days:"
    exampleLines:
      - "Monday: 4 / 5 tasks = 80%"
      - "Tuesday: 3 / 3 tasks = 100%"
      - "Wednesday: 2 / 4 tasks = 50%"
      - "Thursday: 5 / 5 tasks = 100%"
      - "Friday: 3 / 4 tasks = 75%"
      - "Saturday: 2 / 3 tasks = 67%"
      - "Sunday: 1 / 2 tasks = 50%"
      - "→ Average completion = 82%"
    tipsTitle: "Tips to improve"
    tips:
      - title: "Start small"
        description: "It is better to complete 3 small goals than to set 10 and fail 7. Increase gradually."
      - title: "Be realistic"
        description: "Your goals should fit your schedule and available energy."
      - title: "Identify blockers"
        description: "If your rate drops, look at which tasks keep failing and adjust them."
      - title: "Celebrate wins"
        description: "Every completed task matters. A 70% rate is already good!"
  chargeExplain:
    title: "What is workload?"
    definitionTitle: "Definition"
    definition: "Workload is a quantitative measure of your average daily amount of work. It reflects the complexity and scope of your goals over a period."
    howTitle: "How is it calculated?"
    bullets:
      - "Each task contributes to your daily workload"
      - "A 7-day average is calculated"
      - "Only past days are counted (not the current day)"
      - "Workload is expressed as an average number of tasks"
    levelsTitle: "Workload levels"
    levels:
      - title: "Low workload"
        description: "Less than 2 tasks on average"
      - title: "Moderate workload"
        description: "Between 2 and 4 tasks on average"
      - title: "Healthy workload"
        description: "More than 4 tasks and up to 7"
    interpretationTitle: "Interpretation"
    interpretations:
      - emoji: "📊"
        title: "Understand your workload"
        description: "Workload helps you evaluate whether your amount of work is balanced. Too little may show low motivation, while too much can lead to burnout."
      - emoji: "⚖️"
        title: "Seek balance"
        description: "The ideal is a moderate to healthy workload so you stay productive without exhausting yourself."
    exampleTitle: "Example"
    exampleSubtitle: "Last 7 days:"
    exampleLines:
      - "Monday: 2 tasks"
      - "Tuesday: 3 tasks"
      - "Wednesday: 2 tasks"
      - "Thursday: 4 tasks"
      - "Friday: 3 tasks"
      - "Saturday: 5 tasks"
      - "Sunday: 2 tasks"
      - "→ Average workload = 3.1 tasks"
    tipsTitle: "Tips"
    tips:
      - title: "Adjust your goals"
        description: "If your workload is too low, slightly increase your goals. If it's too high, reduce them gradually."
      - title: "Watch trends"
        description: "Track your workload over time to spot patterns and adapt your strategy."
      - title: "Stay consistent"
        description: "A stable and realistic workload is more effective than alternating overload and underload."
