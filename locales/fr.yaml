  streakExplain:
    title: "Qu'est-ce qu'un streak ?"
    definitionTitle: "Définition"
    definition: "Un streak est une série consécutive de jours où vous avez complété 100% de vos tâches. C'est une mesure de votre consistance et de votre engagement."
    howTitle: "Comment ça fonctionne ?"
    bullets:
      - "Chaque jour compte pour votre streak"
      - "Vous devez compléter toutes vos tâches pour maintenir le streak"
      - "Si vous manquez une seule tâche, le streak s'interrompt"
      - "Le streak se compte à partir des jours passés, pas aujourd'hui"
    conditionsTitle: "Conditions pour avoir un streak"
    conditions:
      - title: "Complétude à 100%"
        description: "Vous devez compléter tous vos objectifs du jour. Une seule tâche incomplète cassera la chaîne."
      - title: "Consécutivité"
        description: "Les jours doivent être consécutifs. Un jour manqué interrompt immédiatement votre streak."
      - title: "Compter les jours passés"
        description: "Seuls les jours précédents aujourd'hui sont comptabilisés. Le jour courant n'est pas inclus dans le calcul."
    exampleTitle: "Exemple"
    exampleSuccess:
      - "✓ Jour 1 - Toutes tâches complètes"
      - "✓ Jour 2 - Toutes tâches complètes"
      - "✓ Jour 3 - Toutes tâches complètes"
      - "→ Streak de 3 jours"
    exampleFail:
      - "✓ Jour 1 - Toutes tâches complètes"
      - "✓ Jour 2 - Toutes tâches complètes"
      - "✗ Jour 3 - Une tâche manquée"
      - "→ Streak cassé, recommence à 0"
    tipsTitle: "Conseils"
    tips:
      - title: "Restez constant"
        description: "Un streak est une belle manière de mesurer votre engagement. Essayez de maintenir vos streaks le plus longtemps possible !"
      - title: "Planifiez vos tâches"
        description: "Assurez-vous que vos objectifs quotidiens sont réalistes pour pouvoir les compléter tous les jours."
      - title: "Célébrez vos progrès"
        description: "Chaque jour complété est une victoire ! Prolongez votre streak et voyez jusqu'où vous pouvez aller."
  completionExplain:
    title: "Qu'est-ce que le taux de complétude ?"
    definitionTitle: "Définition"
    definition: "Le taux de complétude est le pourcentage moyen de tâches que vous complétez sur une période donnée. C'est un indicateur de votre capacité à atteindre vos objectifs."
    howTitle: "Comment est-il calculé ?"
    bullets:
      - "Pour chaque jour, on divise les tâches complétées par le nombre total de tâches"
      - "Formule : (tâches complétées / total des tâches) × 100"
      - "Une moyenne sur 7 jours est ensuite calculée"
      - "Le résultat est exprimé en pourcentage"
    interpretationTitle: "Interprétation des résultats"
    levels:
      - range: "0% - 40%"
        description: "Très faible : Vos objectifs sont trop ambitieux ou vous manquez de motivation"
      - range: "40% - 70%"
        description: "En construction : Vous progressez mais il y a encore de la marge"
      - range: "70% - 90%"
        description: "Très bon : Vous maîtrisez bien vos objectifs"
      - range: "90% - 100%"
        description: "Excellent : Vous avez atteint vos objectifs quasi systématiquement"
    meaningTitle: "Ce que cela signifie"
    meanings:
      - emoji: "✅"
        title: "Taux élevé (90%+)"
        description: "Vous êtes consistant et fiable. Vos objectifs sont bien calibrés pour votre capacité réelle."
      - emoji: "⚠️"
        title: "Taux moyen (50-80%)"
        description: "Vous avez des jours avec et des jours sans. Analysez les obstacles récurrents."
      - emoji: "🔴"
        title: "Taux faible (<50%)"
        description: "Vos objectifs sont probablement trop nombreux ou trop complexes. Commencez plus petit."
    exampleTitle: "Exemple"
    exampleSubtitle: "Calcul sur 7 jours :"
    exampleLines:
      - "Lundi : 4 / 5 tâches = 80%"
      - "Mardi : 3 / 3 tâches = 100%"
      - "Mercredi : 2 / 4 tâches = 50%"
      - "Jeudi : 5 / 5 tâches = 100%"
      - "Vendredi : 3 / 4 tâches = 75%"
      - "Samedi : 2 / 3 tâches = 67%"
      - "Dimanche : 1 / 2 tâches = 50%"
      - "→ Complétude moyenne = 82%"
    tipsTitle: "Conseils pour progresser"
    tips:
      - title: "Commencez petit"
        description: "Il vaut mieux compléter 3 petits objectifs que d'en proposer 10 et en échouer 7. Augmentez progressivement."
      - title: "Soyez réaliste"
        description: "Vos objectifs doivent être atteignables selon votre emploi du temps et votre énergie disponible."
      - title: "Identifiez les blocages"
        description: "Si votre taux chute, regardez quelles tâches vous échouez systématiquement et ajustez-les."
      - title: "Célébrez les succès"
        description: "Chaque tâche complétée compte. Un taux de 70% est déjà une bonne performance !"
  chargeExplain:
    title: "Qu'est-ce que la charge ?"
    definitionTitle: "Définition"
    definition: "La charge est une mesure quantitative de votre volume de travail quotidien moyen. Elle représente la complexité et l'ampleur de vos objectifs sur une période donnée."
    howTitle: "Comment est-elle calculée ?"
    bullets:
      - "Chaque tâche contribue à votre charge quotidienne"
      - "Un calcul de moyenne sur 7 jours est effectué"
      - "Seuls les jours passés sont pris en compte (pas le jour courant)"
      - "La charge est exprimée en nombre moyen de tâches"
    levelsTitle: "Niveaux de charge"
    levels:
      - title: "Charge faible"
        description: "Moins de 2 tâches en moyenne"
      - title: "Charge modérée"
        description: "Entre 2 et 4 tâches en moyenne"
      - title: "Charge saine"
        description: "Plus de 4 tâches et jusqu'à 7"
    interpretationTitle: "Interprétation"
    interpretations:
      - emoji: "📊"
        title: "Comprendre votre charge"
        description: "La charge vous aide à évaluer si votre charge de travail est équilibrée. Une charge trop faible peut indiquer un manque de motivation, tandis qu'une charge très élevée peut mener au surmenage."
      - emoji: "⚖️"
        title: "Chercher l'équilibre"
        description: "L'idéal est de maintenir une charge modérée à saine pour rester productif sans vous épuiser."
    exampleTitle: "Exemple"
    exampleSubtitle: "7 derniers jours :"
    exampleLines:
      - "Lundi : 2 tâches"
      - "Mardi : 3 tâches"
      - "Mercredi : 2 tâches"
      - "Jeudi : 4 tâches"
      - "Vendredi : 3 tâches"
      - "Samedi : 5 tâches"
      - "Dimanche : 2 tâches"
      - "→ Charge moyenne = 3.1 tâches"
    tipsTitle: "Conseils"
    tips:
      - title: "Ajustez vos objectifs"
        description: "Si votre charge est trop basse, augmentez légèrement vos objectifs. Si elle est trop haute, réduisez-les progressivement."
      - title: "Observez les tendances"
        description: "Suivez votre charge au fil du temps pour identifier les patterns et adapter votre stratégie."
      - title: "Restez cohérent"
        description: "Une charge stable et réaliste est plus efficace qu'une alternance entre surcharge et sous-charge."
